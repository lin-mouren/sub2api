name: Weekly Health Audit

on:
  schedule:
    # Monday 09:17 Asia/Shanghai (01:17 UTC)
    - cron: '17 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-health-audit
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate weekly health snapshot
        shell: bash
        run: |
          set -euo pipefail

          now_utc="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          now_cst="$(TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M:%S %Z")"

          compare_json="$(gh api "repos/${REPO}/compare/main...mirror/upstream-main")"
          compare_status="$(jq -r '.status' <<<"${compare_json}")"
          ahead_by="$(jq -r '.ahead_by' <<<"${compare_json}")"
          behind_by="$(jq -r '.behind_by' <<<"${compare_json}")"
          base_sha="$(jq -r '.base_commit.sha' <<<"${compare_json}")"

          open_pr_count="$(gh pr list --repo "${REPO}" --state open --json number --jq 'length')"
          open_sync_pr_count="$(gh pr list --repo "${REPO}" --state open --base main --json headRefName --jq '[ .[] | select(.headRefName=="mirror/upstream-main" or (.headRefName|startswith("sync/upstream-main-"))) ] | length')"

          latest_release_json="$(gh release list --repo "${REPO}" --limit 1 --json tagName,name,publishedAt,isPrerelease)"
          latest_tag="$(jq -r '.[0].tagName // "n/a"' <<<"${latest_release_json}")"
          latest_release_time="$(jq -r '.[0].publishedAt // "n/a"' <<<"${latest_release_json}")"
          latest_release_prerelease="$(jq -r '.[0].isPrerelease // "n/a"' <<<"${latest_release_json}")"
          latest_release_url="n/a"
          if [ "${latest_tag}" != "n/a" ]; then
            release_view_json="$(gh release view "${latest_tag}" --repo "${REPO}" --json url 2>/dev/null || echo '{}')"
            latest_release_url="$(jq -r '.url // "n/a"' <<<"${release_view_json}")"
          fi

          approvals="$(gh api "repos/${REPO}/rulesets" --jq '.[] | select(.name=="protect-main") | (.rules[] | select(.type=="pull_request") | .parameters.required_approving_review_count)' | head -n1)"
          strict="$(gh api "repos/${REPO}/rulesets" --jq '.[] | select(.name=="protect-main") | (.rules[] | select(.type=="required_status_checks") | .parameters.strict_required_status_checks_policy)' | head -n1)"
          merge_methods="$(gh api "repos/${REPO}/rulesets" --jq '.[] | select(.name=="protect-main") | (.rules[] | select(.type=="pull_request") | .parameters.allowed_merge_methods | join(","))' | head -n1)"
          required_checks="$(gh api "repos/${REPO}/rulesets" --jq '.[] | select(.name=="protect-main") | (.rules[] | select(.type=="required_status_checks") | .parameters.required_status_checks | map(.context) | join(", "))' | head -n1)"

          sync_runs="$(gh run list --repo "${REPO}" --workflow upstream-sync.yml --limit 5 --json databaseId,conclusion,createdAt,url --jq '.[] | "- run `\(.databaseId)` | \(.conclusion // "in_progress") | \(.createdAt) | [link](\(.url))"')"
          deploy_runs="$(gh run list --repo "${REPO}" --workflow deploy-marker.yml --limit 5 --json databaseId,conclusion,createdAt,url --jq '.[] | "- run `\(.databaseId)` | \(.conclusion // "in_progress") | \(.createdAt) | [link](\(.url))"')"

          if [ -z "${sync_runs}" ]; then
            sync_runs="- no data"
          fi
          if [ -z "${deploy_runs}" ]; then
            deploy_runs="- no data"
          fi

          cat > docs/post-release-health-audit-weekly.md <<MD
          # Weekly Post-Release Health Audit Snapshot

          Generated at (UTC): ${now_utc}
          Generated at (Asia/Shanghai): ${now_cst}
          Repository: ${REPO}

          ## Summary
          - latest release tag: ${latest_tag}
          - latest release prerelease: ${latest_release_prerelease}
          - open PR count: ${open_pr_count}
          - open sync PR count: ${open_sync_pr_count}

          ## Upstream Sync Health
          - compare(main...mirror/upstream-main): status=${compare_status}, ahead_by=${ahead_by}, behind_by=${behind_by}
          - base commit sha: ${base_sha}

          ### Recent Upstream Sync Runs
          ${sync_runs}

          ## Deploy Marker Health
          ### Recent Deploy Marker Runs
          ${deploy_runs}

          ## Governance Snapshot
          - protect-main approvals: ${approvals}
          - strict required status checks: ${strict}
          - allowed merge methods: ${merge_methods}
          - required checks: ${required_checks}

          ## Release Snapshot
          - release url: ${latest_release_url}
          - published at: ${latest_release_time}

          ## Notes
          - This file is generated by ".github/workflows/weekly-health-audit.yml".
          - If compare shows ahead_by > 0, ensure a sync PR exists and is tracked.
          MD

      - name: Create or update audit PR
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'docs(audit): refresh weekly post-release health snapshot'
          title: 'docs(audit): weekly post-release health snapshot'
          body: |
            ## Summary
            - refresh weekly post-release health snapshot
            - source workflow: `.github/workflows/weekly-health-audit.yml`

            ## Notes
            - this PR is generated automatically on schedule or workflow_dispatch
          branch: automation/weekly-health-audit
          delete-branch: false
          add-paths: |
            docs/post-release-health-audit-weekly.md
