name: Upstream Sync (mirror + PR)

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: upstream-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.UPSTREAM_SYNC_DEPLOY_KEY }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream and origin refs
        run: |
          git remote add upstream https://github.com/Wei-Shaw/sub2api.git 2>/dev/null || \
            git remote set-url upstream https://github.com/Wei-Shaw/sub2api.git
          git fetch upstream main --prune
          git fetch origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/heads/mirror/upstream-main:refs/remotes/origin/mirror/upstream-main \
            --prune || true

      - name: Fast-forward mirror/upstream-main
        shell: bash
        run: |
          set -euo pipefail

          if git show-ref --verify --quiet "refs/remotes/origin/mirror/upstream-main"; then
            git checkout -B mirror/upstream-main origin/mirror/upstream-main
          else
            git checkout -B mirror/upstream-main upstream/main
          fi

          git merge --ff-only upstream/main
          git push origin HEAD:refs/heads/mirror/upstream-main

      - name: Upsert sync PR (mirror/upstream-main -> main)
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_SYNC_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/heads/mirror/upstream-main:refs/remotes/origin/mirror/upstream-main \
            --prune || true

          if ! git show-ref --verify --quiet "refs/remotes/origin/mirror/upstream-main"; then
            echo "mirror/upstream-main not found on origin, skipping PR upsert."
            exit 0
          fi

          existing_pr="$(gh pr list --state open --base main --head mirror/upstream-main --json number --jq '.[0].number // empty')"

          if git merge-base --is-ancestor origin/mirror/upstream-main origin/main; then
            if [ -n "${existing_pr}" ]; then
              gh pr close "${existing_pr}" --comment "main already contains mirror/upstream-main; closing this sync PR."
            fi
            exit 0
          fi

          if [ -n "${existing_pr}" ]; then
            echo "Open sync PR already exists: #${existing_pr}"
            exit 0
          fi

          set +e
          pr_create_output="$(gh pr create \
            --base main \
            --head mirror/upstream-main \
            --title "chore(upstream): sync Wei-Shaw/sub2api main" \
            --body "Automated upstream sync PR from mirror/upstream-main to main." 2>&1)"
          pr_create_status=$?
          set -e

          if [ "${pr_create_status}" -ne 0 ]; then
            if echo "${pr_create_output}" | grep -q "No commits between"; then
              echo "No commits between mirror/upstream-main and main, nothing to open."
              exit 0
            fi
            echo "${pr_create_output}"
            exit "${pr_create_status}"
          fi

          echo "${pr_create_output}"

      - name: Notify on sync failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_SYNC_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          title="[upstream-sync] workflow failures"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          message="Workflow run failed.

          - Repository: ${GITHUB_REPOSITORY}
          - Branch: ${GITHUB_REF_NAME}
          - Trigger: ${GITHUB_EVENT_NAME}
          - Run: ${run_url}"

          existing_issue="$(gh issue list \
            --state open \
            --search "\"${title}\" in:title" \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${existing_issue}" ]; then
            gh issue comment "${existing_issue}" --body "${message}"
            exit 0
          fi

          gh issue create --title "${title}" --body "${message}"
