name: Upstream Sync (mirror + PR)

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: upstream-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.UPSTREAM_SYNC_DEPLOY_KEY }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream and origin refs
        run: |
          git remote add upstream https://github.com/Wei-Shaw/sub2api.git 2>/dev/null || \
            git remote set-url upstream https://github.com/Wei-Shaw/sub2api.git
          git fetch upstream main --prune
          git fetch origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/heads/mirror/upstream-main:refs/remotes/origin/mirror/upstream-main \
            --prune || true

      - name: Fast-forward mirror/upstream-main
        shell: bash
        run: |
          set -euo pipefail

          if git show-ref --verify --quiet "refs/remotes/origin/mirror/upstream-main"; then
            git checkout -B mirror/upstream-main origin/mirror/upstream-main
          else
            git checkout -B mirror/upstream-main upstream/main
          fi

          git merge --ff-only upstream/main
          git push origin HEAD:refs/heads/mirror/upstream-main

      - name: Upsert sync PR (mirror/upstream-main -> main)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/heads/mirror/upstream-main:refs/remotes/origin/mirror/upstream-main \
            --prune || true

          if ! git show-ref --verify --quiet "refs/remotes/origin/mirror/upstream-main"; then
            echo "mirror/upstream-main not found on origin, skipping PR upsert."
            exit 0
          fi

          get_existing_pr() {
            gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls?state=open&base=main&per_page=100" \
              --jq '.[] | select(.head.ref=="mirror/upstream-main") | .number' | head -n 1
          }

          compare_endpoint="repos/${GITHUB_REPOSITORY}/compare/main...mirror%2Fupstream-main"
          compare_tsv=""
          for attempt in 1 2 3 4 5; do
            if compare_tsv="$(gh api "${compare_endpoint}" \
              --jq '[.status, (.ahead_by|tostring), (.behind_by|tostring), (.total_commits|tostring), (.merge_base_commit.sha // ""), (.base_commit.sha // "")] | @tsv' \
              2>/tmp/upstream-compare.err)"; then
              break
            fi
            echo "compare api not ready, retry ${attempt}/5"
            sleep 3
          done

          if [ -z "${compare_tsv}" ]; then
            echo "::error::failed to read compare(main...mirror/upstream-main) after retries"
            cat /tmp/upstream-compare.err || true
            exit 1
          fi

          IFS=$'\t' read -r compare_status ahead_by behind_by total_commits merge_base_sha base_sha <<<"${compare_tsv}"

          if ! [[ "${ahead_by}" =~ ^[0-9]+$ ]]; then
            echo "::error::invalid ahead_by from compare api: ${ahead_by}"
            exit 1
          fi
          if ! [[ "${behind_by}" =~ ^[0-9]+$ ]]; then
            echo "::error::invalid behind_by from compare api: ${behind_by}"
            exit 1
          fi

          echo "compare(main...mirror/upstream-main): status=${compare_status} ahead_by=${ahead_by} behind_by=${behind_by} total_commits=${total_commits} merge_base=${merge_base_sha} base=${base_sha}"
          {
            echo "### Upstream Sync Compare"
            echo "- status: ${compare_status}"
            echo "- ahead_by: ${ahead_by}"
            echo "- behind_by: ${behind_by}"
            echo "- total_commits: ${total_commits}"
            echo "- merge_base: ${merge_base_sha}"
            echo "- main_base_sha: ${base_sha}"
          } >> "${GITHUB_STEP_SUMMARY}"

          existing_pr="$(get_existing_pr)"
          if [ "${ahead_by}" -eq 0 ]; then
            if [ -n "${existing_pr}" ]; then
              pr_state="$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${existing_pr}" --jq '.state' 2>/dev/null || true)"
              if [ "${pr_state}" = "open" ]; then
                gh api -X PATCH "repos/${GITHUB_REPOSITORY}/pulls/${existing_pr}" -f state=closed >/dev/null
                gh api "repos/${GITHUB_REPOSITORY}/issues/${existing_pr}/comments" \
                  -f body="main already contains mirror/upstream-main; closing this sync PR." >/dev/null
                echo "Closed obsolete sync PR #${existing_pr}"
              else
                echo "Sync PR #${existing_pr} is already ${pr_state:-unknown}; skip close."
              fi
            else
              echo "No sync PR needed: mirror is not ahead of main."
            fi
            exit 0
          fi

          pr_number="${existing_pr}"
          if [ -z "${pr_number}" ]; then
            if pr_number="$(gh api -X POST "repos/${GITHUB_REPOSITORY}/pulls" \
              -f title="chore(upstream): sync Wei-Shaw/sub2api main" \
              -f head="mirror/upstream-main" \
              -f base="main" \
              -f body="Automated upstream sync PR from mirror/upstream-main to main." \
              --jq '.number' 2>/tmp/upstream-pr-create.err)"; then
              echo "Created sync PR #${pr_number}"
            else
              if grep -q "A pull request already exists" /tmp/upstream-pr-create.err; then
                pr_number="$(get_existing_pr)"
                echo "Detected existing sync PR #${pr_number} after create race."
              else
                echo "::error::failed to create sync PR"
                cat /tmp/upstream-pr-create.err || true
                exit 1
              fi
            fi
          else
            echo "Reusing open sync PR #${pr_number}"
          fi

          if [ "${ahead_by}" -gt 0 ] && [ -z "${pr_number}" ]; then
            echo "::error::mirror is ahead of main (ahead_by=${ahead_by}) but no sync PR exists"
            exit 1
          fi

          echo "sync_pr_number=${pr_number}" >> "${GITHUB_OUTPUT}"
          {
            echo "- sync_pr: #${pr_number}"
            echo "- action: upserted"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Notify on sync failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          title="[upstream-sync] workflow failures"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          message="Workflow run failed.

          - Repository: ${GITHUB_REPOSITORY}
          - Branch: ${GITHUB_REF_NAME}
          - Trigger: ${GITHUB_EVENT_NAME}
          - Run: ${run_url}"

          has_issues="$(gh api repos/${GITHUB_REPOSITORY} --jq '.has_issues')"
          if [ "${has_issues}" != "true" ]; then
            gh api repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments \
              -f body="${message}"
            exit 0
          fi

          existing_issue="$(gh issue list \
            --state open \
            --search "\"${title}\" in:title" \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${existing_issue}" ]; then
            gh issue comment "${existing_issue}" --body "${message}"
            exit 0
          fi

          gh issue create --title "${title}" --body "${message}"
