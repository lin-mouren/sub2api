name: Upstream Sync (mirror + PR)

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: upstream-sync
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.UPSTREAM_SYNC_DEPLOY_KEY }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream and origin refs
        run: |
          git remote add upstream https://github.com/Wei-Shaw/sub2api.git 2>/dev/null || \
            git remote set-url upstream https://github.com/Wei-Shaw/sub2api.git
          git fetch upstream main --prune
          git fetch origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/heads/mirror/upstream-main:refs/remotes/origin/mirror/upstream-main \
            --prune || true

      - name: Fast-forward mirror/upstream-main
        shell: bash
        run: |
          set -euo pipefail

          if git show-ref --verify --quiet "refs/remotes/origin/mirror/upstream-main"; then
            git checkout -B mirror/upstream-main origin/mirror/upstream-main
          else
            git checkout -B mirror/upstream-main upstream/main
          fi

          if git merge-base --is-ancestor HEAD upstream/main; then
            echo "mirror/upstream-main can be fast-forwarded to upstream/main"
          elif git merge-base --is-ancestor upstream/main HEAD; then
            echo "::error::origin/mirror/upstream-main contains commits that are not in upstream/main; mirror branch is polluted and requires break-glass realignment."
            echo "Mirror-only commits:"
            git log --oneline upstream/main..HEAD | sed -n '1,20p'
            {
              echo "### Mirror Sync Blocked"
              echo "- state: polluted"
              echo "- reason: origin/mirror/upstream-main is ahead of upstream/main"
              echo "- required_action: break-glass realignment using force-with-lease outside automation"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          else
            echo "::error::origin/mirror/upstream-main and upstream/main have diverged; manual break-glass realignment is required."
            echo "Divergence summary:"
            git log --oneline --left-right --cherry-pick HEAD...upstream/main | sed -n '1,40p'
            {
              echo "### Mirror Sync Blocked"
              echo "- state: diverged"
              echo "- reason: origin/mirror/upstream-main and upstream/main are not in a fast-forward relationship"
              echo "- required_action: inspect history and realign mirror manually"
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 1
          fi

          git merge --ff-only upstream/main
          git push origin HEAD:refs/heads/mirror/upstream-main

      - name: Upsert sync PR (sync/* -> main)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin \
            +refs/heads/main:refs/remotes/origin/main \
            +refs/heads/mirror/upstream-main:refs/remotes/origin/mirror/upstream-main \
            --prune || true

          if ! git show-ref --verify --quiet "refs/remotes/origin/mirror/upstream-main"; then
            echo "mirror/upstream-main not found on origin, skipping PR upsert."
            exit 0
          fi

          close_prs_by_head() {
            local head_ref="$1"
            local prs
            prs="$(gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls?state=open&base=main&per_page=100" \
              --jq ".[] | select(.head.ref==\"${head_ref}\") | .number")"
            if [ -z "${prs}" ]; then
              return 0
            fi
            while IFS= read -r pr_number; do
              if [ -z "${pr_number}" ]; then
                continue
              fi
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" -f state=closed >/dev/null
              gh api "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments" \
                -f body="Closed by upstream-sync automation: this PR head is no longer the active sync source." >/dev/null
              echo "Closed stale PR #${pr_number} (head=${head_ref})"
            done <<< "${prs}"
          }

          close_prs_by_prefix() {
            local prefix="$1"
            local keep_head="${2:-}"
            local prs
            prs="$(gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls?state=open&base=main&per_page=100" \
              --jq ".[] | select(.head.ref | startswith(\"${prefix}\")) | [.number, .head.ref] | @tsv")"
            if [ -z "${prs}" ]; then
              return 0
            fi
            while IFS=$'\t' read -r pr_number pr_head; do
              if [ -z "${pr_number}" ]; then
                continue
              fi
              if [ -n "${keep_head}" ] && [ "${pr_head}" = "${keep_head}" ]; then
                continue
              fi
              gh api -X PATCH "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}" -f state=closed >/dev/null
              gh api "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments" \
                -f body="Closed by upstream-sync automation: replaced by a newer sync branch PR." >/dev/null
              echo "Closed stale sync PR #${pr_number} (${pr_head})"
            done <<< "${prs}"
          }

          ensure_conflict_comment() {
            local pr_number="$1"
            local marker="<!-- upstream-sync:manual-conflict-resolution-required -->"
            local body
            body="${marker}

          Upstream sync automation detected a merge conflict while refreshing this existing \`sync/* -> main\` PR.

          - Cause: \`main\` changed after this sync PR was opened, and replaying \`origin/mirror/upstream-main\` onto the latest \`origin/main\` now conflicts.
          - Action required: resolve conflicts manually in this PR branch or replace it with a new conflict-resolved sync PR.
          - Automation behavior: existing sync PR preserved; no force-reset or auto-close performed."

            if gh api --method GET "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments?per_page=100" \
              --jq ".[] | select(.body | contains(\"${marker}\")) | .id" | grep -q .; then
              return 0
            fi

            gh api "repos/${GITHUB_REPOSITORY}/issues/${pr_number}/comments" \
              -f body="${body}" >/dev/null
          }

          compare_endpoint="repos/${GITHUB_REPOSITORY}/compare/main...mirror%2Fupstream-main"
          compare_tsv=""
          for attempt in 1 2 3 4 5; do
            if compare_tsv="$(gh api "${compare_endpoint}" \
              --jq '[.status, (.ahead_by|tostring), (.behind_by|tostring), (.total_commits|tostring), (.merge_base_commit.sha // ""), (.base_commit.sha // "")] | @tsv' \
              2>/tmp/upstream-compare.err)"; then
              break
            fi
            echo "compare api not ready, retry ${attempt}/5"
            sleep 3
          done

          if [ -z "${compare_tsv}" ]; then
            echo "::error::failed to read compare(main...mirror/upstream-main) after retries"
            cat /tmp/upstream-compare.err || true
            exit 1
          fi

          IFS=$'\t' read -r compare_status ahead_by behind_by total_commits merge_base_sha base_sha <<<"${compare_tsv}"

          if ! [[ "${ahead_by}" =~ ^[0-9]+$ ]]; then
            echo "::error::invalid ahead_by from compare api: ${ahead_by}"
            exit 1
          fi
          if ! [[ "${behind_by}" =~ ^[0-9]+$ ]]; then
            echo "::error::invalid behind_by from compare api: ${behind_by}"
            exit 1
          fi

          echo "compare(main...mirror/upstream-main): status=${compare_status} ahead_by=${ahead_by} behind_by=${behind_by} total_commits=${total_commits} merge_base=${merge_base_sha} base=${base_sha}"
          {
            echo "### Upstream Sync Compare"
            echo "- status: ${compare_status}"
            echo "- ahead_by: ${ahead_by}"
            echo "- behind_by: ${behind_by}"
            echo "- total_commits: ${total_commits}"
            echo "- merge_base: ${merge_base_sha}"
            echo "- main_base_sha: ${base_sha}"
          } >> "${GITHUB_STEP_SUMMARY}"

          existing_sync_tsv="$(
            gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls?state=open&base=main&per_page=100" \
              --jq '.[] | select(.head.ref | startswith("sync/upstream-main-")) | [.number, .head.ref] | @tsv' | head -n 1
          )"
          existing_sync_pr=""
          existing_sync_branch=""
          if [ -n "${existing_sync_tsv}" ]; then
            IFS=$'\t' read -r existing_sync_pr existing_sync_branch <<< "${existing_sync_tsv}"
          fi

          if [ "${ahead_by}" -eq 0 ]; then
            close_prs_by_head "mirror/upstream-main"
            close_prs_by_prefix "sync/upstream-main-"
            echo "No sync PR needed: mirror is not ahead of main."
            exit 0
          fi

          close_prs_by_head "mirror/upstream-main"

          sync_branch="${existing_sync_branch}"
          pr_number="${existing_sync_pr}"
          if [ -z "${sync_branch}" ]; then
            sync_branch="sync/upstream-main-$(date +%Y%m%d%H%M%S)"
            git checkout -B "${sync_branch}" origin/main
            git merge --no-ff --no-edit origin/mirror/upstream-main
            git push origin "${sync_branch}:${sync_branch}"
            if pr_number="$(gh api -X POST "repos/${GITHUB_REPOSITORY}/pulls" \
              -f title="chore(upstream): sync Wei-Shaw/sub2api main" \
              -f head="${sync_branch}" \
              -f base="main" \
              -f body="Automated upstream sync PR from ${sync_branch} to main (mirror remains pure FF)." \
              --jq '.number' 2>/tmp/upstream-pr-create.err)"; then
              echo "Created sync PR #${pr_number}"
            else
              if grep -q "A pull request already exists" /tmp/upstream-pr-create.err; then
                existing_sync_tsv="$(
                  gh api --method GET "repos/${GITHUB_REPOSITORY}/pulls?state=open&base=main&per_page=100" \
                    --jq '.[] | select(.head.ref | startswith("sync/upstream-main-")) | [.number, .head.ref] | @tsv' | head -n 1
                )"
                IFS=$'\t' read -r pr_number sync_branch <<< "${existing_sync_tsv}"
                echo "Detected existing sync PR #${pr_number} after create race."
              else
                echo "::error::failed to create sync PR"
                cat /tmp/upstream-pr-create.err || true
                exit 1
              fi
            fi
          else
            git fetch origin "+refs/heads/${sync_branch}:refs/remotes/origin/${sync_branch}" --prune || true
            refresh_branch="codex-sync-refresh-${sync_branch##*/}"
            git checkout -B "${refresh_branch}" origin/main
            if ! git merge --no-ff --no-edit origin/mirror/upstream-main; then
              {
                echo "### Upstream Sync Refresh"
                echo "- state: manual_conflict_resolution_required"
                echo "- sync_pr: #${pr_number}"
                echo "- sync_branch: ${sync_branch}"
                echo "- reason: refreshing existing sync PR onto latest main produced merge conflicts"
              } >> "${GITHUB_STEP_SUMMARY}"
              ensure_conflict_comment "${pr_number}"
              echo "Existing sync PR #${pr_number} requires manual conflict resolution; leaving branch unchanged."
              exit 0
            fi
            git push origin "HEAD:${sync_branch}" --force-with-lease
            echo "Reusing open sync PR #${pr_number}"
          fi
          close_prs_by_prefix "sync/upstream-main-" "${sync_branch}"

          if [ "${ahead_by}" -gt 0 ] && { [ -z "${pr_number}" ] || [ -z "${sync_branch}" ]; }; then
            echo "::error::mirror is ahead of main (ahead_by=${ahead_by}) but sync PR upsert failed"
            exit 1
          fi

          echo "sync_pr_number=${pr_number}" >> "${GITHUB_OUTPUT}"
          {
            echo "- sync_pr: #${pr_number}"
            echo "- sync_branch: ${sync_branch}"
            echo "- action: upserted"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Notify on sync failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          title="[upstream-sync] workflow failures"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          message="Workflow run failed.

          - Repository: ${GITHUB_REPOSITORY}
          - Branch: ${GITHUB_REF_NAME}
          - Trigger: ${GITHUB_EVENT_NAME}
          - Run: ${run_url}"

          has_issues="$(gh api repos/${GITHUB_REPOSITORY} --jq '.has_issues')"
          if [ "${has_issues}" != "true" ]; then
            gh api repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/comments \
              -f body="${message}"
            exit 0
          fi

          existing_issue="$(gh issue list \
            --state open \
            --search "\"${title}\" in:title" \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${existing_issue}" ]; then
            gh issue comment "${existing_issue}" --body "${message}"
            exit 0
          fi

          gh issue create --title "${title}" --body "${message}"
